<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ziorix — Portfolio</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .hero {
      text-align: center;
      padding: 6rem 0 4rem;
    }
    .hero h1 {
      font-size: 3rem;
      font-weight: 800;
      margin-bottom: 1rem;
    }
    .hero h1 span {
      color: var(--accent);
    }
    .hero p {
      color: var(--text-secondary);
      font-size: 1.15rem;
      max-width: 560px;
      margin: 0 auto 2.5rem;
    }
    .hero-cta {
      display: inline-flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      display: inline-block;
      padding: 0.75rem 1.75rem;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.95rem;
      transition: background var(--transition), transform var(--transition);
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover {
      background: var(--accent-hover);
      color: #fff;
      transform: translateY(-2px);
    }
    .btn-outline {
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }
    .btn-outline:hover {
      border-color: var(--accent);
      color: var(--text-primary);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>

  <!-- ===== NAVIGATION ===== -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo">Ziorix<span>.</span></a>
      <button class="nav-toggle" aria-label="Toggle navigation" onclick="document.querySelector('.nav-links').classList.toggle('open')">☰</button>
      <ul class="nav-links">
        <li><a href="index.html" class="active">Home</a></li>
        <li><a href="about.html">About Me</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </div>
  </nav>

  <!-- ===== HERO ===== -->
  <section class="hero container">
    <h1>Hey, I'm <span>Ziorix</span></h1>
    <p>Minecraft server developer, builder, and community creator. Explore my projects and get to know what I do.</p>
    <div class="hero-cta">
      <a href="projects.html" class="btn btn-primary">View Projects</a>
      <a href="about.html" class="btn btn-outline">About Me</a>
    </div>
  </section>

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer">
    <p>&copy; 2026 Ziorix. All rights reserved.</p>
  </footer>

</body>
</html>
